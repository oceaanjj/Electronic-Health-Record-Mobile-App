# INTAKE AND OUTPUT ASSESSMENT - CLINICAL REFERENCE
# This YAML documents clinical parameters for I&O numerical comparison.
# Alerts are generated by _run_assessment_cdss() in the router using numerical thresholds.
# Not used for keyword matching - serves as clinical documentation reference.

intake_and_output:
  
  oral_intake:
    unit: "milliliters (mL)"
    normal_range: "1000 - 1500 mL per shift / 2400 - 3000 mL per day"
    clinical_context:
      description: "Fluids consumed by mouth (water, juice, soup, ice chips, medications)"
      min_safe: 400
      min_warning: 800
      normal_low: 1000
      normal_high: 2500
      critical_low: 200
      
    assessment_factors:
      - "Patient alert and able to swallow"
      - "NPO status vs regular diet orders"
      - "Nausea, vomiting, difficulty swallowing present"
      - "Thirst complaints, dry mucous membranes"
      - "Recent surgery or medical procedures affecting intake"

  iv_fluids:
    unit: "milliliters (mL)"
    normal_range: "Varies by order; typically 500-1000 mL per 8-hour shift"
    clinical_context:
      description: "IV fluids administered (D5W, NS, LR, TPN, etc.)"
      min_safe: 0
      normal_range_low: 500
      normal_range_high: 2000
      
    assessment_factors:
      - "IV access patent and running without complications"
      - "Fluid type and rate ordered by provider"
      - "Site signs of infection/infiltration (erythema, edema, warmth)"
      - "IV line integrity maintained"

  total_intake:
    unit: "milliliters (mL)"
    calculation: "oral_intake + iv_fluids"
    normal_range: "1200 - 2500 mL per 8-hour shift / 2400 - 3000 mL per 24 hours"
    clinical_context:
      description: "Combined fluid intake from all sources"

  urine_output:
    unit: "milliliters (mL)"
    normal_range: "1200 - 1500 mL per 24 hours / 400 - 500 mL per 8-hour shift"
    clinical_context:
      description: "Urinary output volume"
      critical_low: 400  # Oliguria threshold
      critical_anuria: 0  # Anuria (complete absence)
      warning_low: 500
      normal_low: 800
      normal_high: 1500
      
    assessment_factors:
      - "Catheter patency (if indwelling catheter in place)"
      - "Urine color: pale yellow (dilute) vs dark amber (concentrated)"
      - "Urine clarity: clear vs cloudy"
      - "Presence of blood, sediment, or unusual odor"
      - "Urinary retention vs true low output"
      - "Medications affecting urine output (diuretics, ACE inhibitors)"
      - "Fluid losses from other sources (vomiting, diarrhea, wound drainage, NG output)"

# ────────────────── CRITICAL CONDITIONS ──────────────────

critical_conditions:

  anuria:
    threshold: "urine_output = 0 mL"
    severity: critical
    clinical_presentation:
      - "Complete absence of urine output"
      - "Risk of acute renal failure"
      - "Electrolyte imbalances"
      - "Metabolic acidosis"
    nursing_assessment:
      - "Assess for urinary retention (palpate bladder, check for distension)"
      - "If catheter present: check catheter patency (flush per protocol, check kinks)"
      - "Assess recent fluid intake and losses"
      - "Check vital signs for shock signs (hypotension, tachycardia, cool/pale skin)"
    nursing_interventions:
      - "Notify provider STAT"
      - "Increase IV fluid rate if ordered"
      - "Straight cath if retention suspected"
      - "Monitor BUN, Cr, electrolytes (lab order if not recent)"
      - "Strict I&O monitoring every 1-2 hours"

  oliguria:
    threshold: "0 < urine_output < 400 mL (in 24 hours or <200 mL in 8 hours)"
    severity: critical
    clinical_presentation:
      - "Significantly reduced urine output"
      - "Risk of acute kidney injury (AKI)"
      - "Potential dehydration or shock"
    nursing_assessment:
      - "Compare current output to baseline"
      - "Review fluid intake and other losses (GI, wounds, perspiration)"
      - "Assess hydration status (mucous membranes, skin turgor, thirst)"
      - "Check vital signs for hypotension/tachycardia"
      - "Review medications affecting renal function"
    nursing_interventions:
      - "Notify provider"
      - "Increase IV fluid rate per order"
      - "Monitor vital signs q15-30min"
      - "Assess BUN/Cr trends"
      - "Strict I&O q1-2h"
      - "Encourage oral intake if allowed"

  severe_dehydration:
    threshold: "total_intake < 500 mL AND urine_output < 500 mL"
    severity: critical
    clinical_presentation:
      - "Critically low total fluid intake"
      - "Reduced urine output"
      - "Risk of hypovolemic shock"
    nursing_assessment:
      - "Check orthostatic vital signs if patient able to stand"
      - "Assess skin turgor, mucous membrane moisture"
      - "Urine specific gravity (concentrated if dehydrated)"
      - "Recent losses: vomiting, diarrhea, NG output, wound drainage"
    nursing_interventions:
      - "Notify provider immediately"
      - "Increase IV fluid rate significantly"
      - "Monitor vital signs continuously"
      - "Encourage PO intake if allowed"
      - "Monitor mental status for early shock signs"

# ────────────────── WARNING CONDITIONS ──────────────────

warning_conditions:

  dehydration:
    threshold: "total_intake < 800 mL AND urine_output < 800 mL"
    severity: warning
    clinical_presentation:
      - "Low fluid intake with decreased urine output"
      - "Possible dehydration or inadequate fluid replacement"
    nursing_assessment:
      - "Evaluate reason for low intake (NPO, unable to swallow, limited access)"
      - "Assess urine concentration (specific gravity, color)"
      - "Check mucous membranes, thirst complaints"
      - "Review any fluid losses beyond measured output"
    nursing_interventions:
      - "Increase PO intake if patient able"
      - "Increase IV fluid rate if ordered"
      - "Monitor every 2-4 hours for improvement"
      - "Reassess reason for low intake and address barriers"

  fluid_overload:
    threshold: "total_intake > 2500 mL AND urine_output < 1500 mL"
    severity: warning
    clinical_presentation:
      - "High fluid intake with inadequate urine output"
      - "Fluid accumulation in body"
      - "Risk of pulmonary edema, heart failure exacerbation"
    nursing_assessment:
      - "Assess for signs of fluid overload: edema, weight gain, crackles in lungs"
      - "Auscultate lung bases for crackles/rales"
      - "Check for dyspnea, orthopnea, JVD"
      - "Recent weight changes"
      - "Assess kidney function (BUN/Cr)"
    nursing_interventions:
      - "Restrict fluid intake per provider order"
      - "Diuretics may be ordered"
      - "Daily weights (same time, same clothing)"
      - "Monitor respiratory status for crackles"
      - "Elevate head of bed if dyspneic"

  output_exceeds_intake:
    threshold: "urine_output > (total_intake × 1.5)"
    severity: warning
    clinical_presentation:
      - "Urine output significantly exceeds intake"
      - "Possible diuretic use, diabetes insipidus, or other losses"
      - "Risk of dehydration if continues"
    nursing_assessment:
      - "Review medications (diuretics, antidiabetic agents)"
      - "Assess for other fluid losses (diarrhea, vomiting, perspiration)"
      - "Check vital signs for hypotension"
      - "Assess urine color/concentration (dilute suggests good hydration)"
    nursing_interventions:
      - "Increase fluid intake significantly"
      - "Review diuretic orders with provider if inappropriate"
      - "Monitor vital signs for hypotension"
      - "Reassess every 2-4 hours"

# ────────────────── NORMAL/INFO CONDITIONS ──────────────────

normal_conditions:

  adequate_hydration:
    threshold: "1200 ≤ total_intake ≤ 2500 mL AND 800 ≤ urine_output ≤ 1500 mL"
    severity: info
    clinical_presentation:
      - "Balanced fluid intake and output"
      - "Adequate hydration status"
    nursing_assessment:
      - "Mucous membranes moist, skin turgor normal"
      - "Urine light yellow to pale amber color"
      - "Vital signs stable"
    nursing_interventions:
      - "Continue current fluid regimen"
      - "Maintain I&O monitoring q4-8h per protocol"
      - "Encourage continued adequate intake"

  acceptable_intake:
    threshold: "800 ≤ total_intake ≤ 1200 mL AND 500 ≤ urine_output ≤ 1000 mL"
    severity: info
    clinical_presentation:
      - "Low-normal fluid intake and output"
      - "Acceptable hydration within low-normal range"
    nursing_assessment:
      - "Patient tolerating PO intake"
      - "Urine output within acceptable limits despite lower intake"
      - "No signs of dehydration"
    nursing_interventions:
      - "Monitor closely, reassess q4h"
      - "Encourage increased PO intake if patient is able"
      - "Continue standard I&O monitoring"

# ────────────────── COMBINATION LOGIC ──────────────────

alert_algorithm:
  - "Input: oral_intake (mL), iv_fluids (mL), urine_output (mL)"
  - "Calculate: total_intake = oral_intake + iv_fluids"
  - "Compare: total_intake vs urine_output using thresholds"
  - "Severity escalates: CRITICAL > WARNING > INFO"
  - "Single combined alert generated based on highest severity match"
  - "Alert includes numerical values and clinical guidance"
  - "No individual field alerts; all 3 inputs evaluated together"

measurement_protocol:
  - "Measure all oral fluid intake (water, juice, soup, medications, ice chips, etc.)"
  - "Document IV fluids from all infusion pumps/gravity bags"
  - "Measure urine output directly (catheter, bedpan, urinal, specimen cup)"
  - "Document any other losses: vomiting, diarrhea, NG output, wound drainage, perspiration"
  - "Calculate totals at end of shift (or every 4-8 hours per protocol)"
  - "Report significant imbalances to provider"
