# VITAL SIGNS ASSESSMENT - CLINICAL REFERENCE
# This YAML documents clinical parameters for vital signs numerical comparison.
# Alerts are generated by _run_assessment_cdss() in the router using numerical thresholds.
# Not used for keyword matching - serves as clinical documentation reference.

vital_signs:
  
  temperature:
    unit: "°C"
    normal_range: "36.5 - 37.5"
    clinical_context:
      description: "Core body temperature assessment"
      critical_high: 39.5
      warning_high: 38.0
      warning_low: 36.0
      critical_low: 35.0
      
    conditions:
      hyperthermia_critical:
        threshold: "≥39.5°C"
        severity: critical
        presentation: "High fever with risk of organ damage, febrile seizures (in children)"
        nursing_actions: "Initiate cooling measures, monitor core temp q15min, assess for infection source"
      
      fever:
        threshold: "38.0-39.4°C"
        severity: warning
        presentation: "Fever indicating possible infection/inflammation"
        nursing_actions: "Monitor temp q1-2h, culture if indicated, antipyretics, increase fluids"
      
      hypothermia_mild:
        threshold: "<36°C"
        severity: warning
        presentation: "Mild hypothermia from exposure, sepsis, or medication effects"
        nursing_actions: "Assess cause, passive rewarming, monitor for shivering"
      
      hypothermia_critical:
        threshold: "<35°C"
        severity: critical
        presentation: "Severe hypothermia with risk of arrhythmias, decreased LOC"
        nursing_actions: "Active rewarming, continuous cardiac monitoring, avoid rapid rewarming"
  
  heart_rate:
    unit: "beats per minute (bpm)"
    normal_range: "60 - 100"
    clinical_context:
      description: "Cardiac rate and perfusion assessment"
      critical_high: 150
      warning_high: 100
      warning_low: 60
      critical_low: 50
      
    conditions:
      tachycardia_severe:
        threshold: ">150 bpm"
        severity: critical
        presentation: "Severe elevation indicating shock, cardiogenic compromise, or severe pain"
        nursing_actions: "Assess for shock signs (perfusion, mental status), obtain ECG, notify provider"
      
      tachycardia_critical:
        threshold: "140-150 bpm"
        severity: critical
        presentation: "Marked elevation indicating serious underlying condition"
        nursing_actions: "Obtain 12-lead ECG, continuous monitoring, assess cause (pain, sepsis, dehydration)"
      
      tachycardia:
        threshold: "100-139 bpm"
        severity: warning
        presentation: "Elevated rate from pain, anxiety, fever, dehydration, or exercise"
        nursing_actions: "Monitor q15-30min, address cause, provide comfort measures"
      
      bradycardia:
        threshold: "60-59 bpm"
        severity: warning
        presentation: "Low rate from athletic conditioning, medication (beta-blockers, digoxin), or cardiac issue"
        nursing_actions: "Monitor for symptoms (dizziness, fatigue), assess medication history"
      
      bradycardia_critical:
        threshold: "<50 bpm"
        severity: critical
        presentation: "Severe bradycardia with risk of hemodynamic compromise"
        nursing_actions: "Obtain ECG immediately, continuous monitoring, prepare atropine, notify provider"
  
  respiratory_rate:
    unit: "breaths per minute"
    normal_range: "12 - 20"
    clinical_context:
      description: "Ventilation and oxygenation assessment"
      critical_high: 30
      warning_high: 25
      warning_low: 12
      critical_low: 8
      
    conditions:
      tachypnea_severe:
        threshold: ">30 breaths/min"
        severity: critical
        presentation: "Severe rapid breathing indicating respiratory distress, metabolic acidosis, or sepsis"
        nursing_actions: "Assess respiratory effort, auscultate lungs, check SpO2, obtain ABG if indicated"
      
      tachypnea:
        threshold: "21-30 breaths/min"
        severity: warning
        presentation: "Elevated rate from pain, anxiety, fever, metabolic acidosis, or early respiratory distress"
        nursing_actions: "Monitor oxygenation, pain management, reassess q30min"
      
      bradypnea_severe:
        threshold: "8-11 breaths/min"
        severity: critical
        presentation: "Severe hypoventilation from CNS depression, opioid overdose, or respiratory failure"
        nursing_actions: "Monitor SpO2 closely, assess for opioid effects, prepare for airway intervention"
      
      bradypnea_critical:
        threshold: "<8 breaths/min"
        severity: critical
        presentation: "Critical respiratory depression with immediate risk of respiratory failure"
        nursing_actions: "Call for provider STAT, prepare for intubation, apply bag-valve-mask if needed"
  
  blood_pressure:
    unit: "mmHg (systolic/diastolic)"
    normal_range: "90-140 systolic / 60-90 diastolic"
    clinical_context:
      description: "Perfusion and cardiovascular status assessment"
      critical_high_systolic: 200
      warning_high_systolic: 140
      warning_low_systolic: 90
      critical_low_systolic: 60
      
    conditions:
      hypertensive_crisis:
        threshold: "≥200 systolic"
        severity: critical
        presentation: "Severe hypertension with risk of stroke, MI, or organ damage"
        nursing_actions: "Notify provider STAT, continuous monitoring, prepare antihypertensive medications"
      
      hypertension_severe:
        threshold: "180-199 systolic"
        severity: critical
        presentation: "Severe elevation requiring urgent intervention"
        nursing_actions: "Notify provider, assess for chest pain/neuro symptoms, q15min monitoring"
      
      hypertension:
        threshold: "140-179 systolic"
        severity: warning
        presentation: "Elevated BP from pain, anxiety, stress, or chronic hypertension"
        nursing_actions: "Monitor q1-2h, assess for pain/anxiety, pain management"
      
      hypotension:
        threshold: "90-89 systolic"
        severity: critical
        presentation: "Low perfusion indicating hypovolemia, sepsis, or medication effects"
        nursing_actions: "Check perfusion signs (skin, mental status, urine output), IV access, notify provider"
      
      hypotension_severe:
        threshold: "<60 systolic"
        severity: critical
        presentation: "Profound hypotension with imminent shock"
        nursing_actions: "Call for provider STAT, establish IV access, prepare vasopressors, Trendelenburg position"
  
  oxygen_saturation:
    unit: "% (percent)"
    normal_range: "≥95"
    clinical_context:
      description: "Oxygenation adequacy assessment"
      critical_high: 100  # SpO2 >100 is not possible but document for reference
      warning_high: 100   # Room air SpO2 rarely exceeds 100%
      warning_low: 95
      critical_low: 85
      
    conditions:
      hypoxemia_critical:
        threshold: "<85%"
        severity: critical
        presentation: "Severe hypoxemia with severe oxygen deficit, risk of end-organ damage"
        nursing_actions: "Apply O₂ immediately (non-rebreather), assess airway, prepare for intubation"
      
      hypoxemia_severe:
        threshold: "85-89%"
        severity: critical
        presentation: "Significant hypoxemia requiring urgent intervention"
        nursing_actions: "Apply supplemental O₂, continuous pulse ox monitoring, assess respiratory effort"
      
      hypoxemia_moderate:
        threshold: "90-94%"
        severity: warning
        presentation: "Low oxygenation from hypoventilation, atelectasis, or V/Q mismatch"
        nursing_actions: "Apply O₂ per protocol, encourage deep breathing/coughing, position upright"
      
      normal_oxygenation:
        threshold: "≥95%"
        severity: info
        presentation: "Adequate oxygenation on current respiratory status"
        nursing_actions: "Continue monitoring, maintain current respiratory support"

# COMBINATION ALERTS:
# The _run_assessment_cdss() function generates ONE COMBINED ALERT evaluating all 5 vital signs together.
# Multiple abnormalities are concatenated with " | " separator.
# Severity escalates to CRITICAL if ANY parameter is in the critical range.

alert_combining_rules:
  - "Temperature CRITICAL (≥39.5 or <35°C) → Alert severity = CRITICAL"
  - "HR CRITICAL (>150 or <50 bpm) → Alert severity = CRITICAL"
  - "RR CRITICAL (>30 or <8) → Alert severity = CRITICAL"
  - "BP CRITICAL (≥200 or <60 systolic) → Alert severity = CRITICAL"
  - "SpO2 CRITICAL (<85%) → Alert severity = CRITICAL"
  - "Any WARNING level → Alert severity = WARNING (unless critical present)"
  - "All normal → Alert severity = INFO with confirmation message"
